services:
  - type: web
    name: qwikkle-api
    env: go
    plan: free
    region: oregon
    buildCommand: go build -tags netgo -ldflags "-s -w" -o app ./cmd/api
    startCommand: ./app
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: APP_ENV
        value: production
      # Set these securely in the Render dashboard before deploying
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: RUN_MIGRATIONS
        value: "true"
      - key: COOKIE_DOMAIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: BOOTSTRAP_ADMIN_QKID
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
